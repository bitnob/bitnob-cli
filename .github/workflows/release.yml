name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      GOCACHE: ${{ github.workspace }}/.gocache
      GOMODCACHE: ${{ github.workspace }}/.gomodcache
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Verify formatting
        run: |
          unformatted="$(gofmt -l cmd internal)"
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

  build:
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            archive: tar.gz
          - goos: windows
            goarch: amd64
            archive: zip
          - goos: windows
            goarch: arm64
            archive: zip
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      GOCACHE: ${{ github.workspace }}/.gocache
      GOMODCACHE: ${{ github.workspace }}/.gomodcache
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Build release artifact
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${GITHUB_REF_NAME}"
          COMMIT="${GITHUB_SHA::7}"
          DATE="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"

          mkdir -p dist

          BIN_NAME="bitnob"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BIN_NAME="bitnob.exe"
          fi

          OUT_DIR="dist/bitnob_${VERSION#v}_${{ matrix.goos }}_${{ matrix.goarch }}"
          mkdir -p "${OUT_DIR}"

          LDFLAGS="-X main.buildVersion=${VERSION} -X main.buildCommit=${COMMIT} -X main.buildDate=${DATE}"
          CGO_ENABLED=0 GOOS="${{ matrix.goos }}" GOARCH="${{ matrix.goarch }}" \
            go build -trimpath -ldflags "${LDFLAGS}" -o "${OUT_DIR}/${BIN_NAME}" ./cmd/bitnob

          if [ "${{ matrix.archive }}" = "zip" ]; then
            (cd dist && zip -r "bitnob_${VERSION#v}_${{ matrix.goos }}_${{ matrix.goarch }}.zip" "bitnob_${VERSION#v}_${{ matrix.goos }}_${{ matrix.goarch }}")
          else
            tar -C dist -czf "dist/bitnob_${VERSION#v}_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz" "bitnob_${VERSION#v}_${{ matrix.goos }}_${{ matrix.goarch }}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.tar.gz
          if-no-files-found: ignore

      - name: Upload windows artifact
        if: matrix.goos == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ matrix.goos }}-${{ matrix.goarch }}-zip
          path: dist/*.zip
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Prepare release files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          find dist -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec cp {} release/ \;
          (cd release && sha256sum * > checksums.txt)

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/*.tar.gz
            release/*.zip
            release/checksums.txt
